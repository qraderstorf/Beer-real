<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BeerReal</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BeerReal" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="root">
      <div style="min-height: 100vh; background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 1.5rem;">
        <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🍻</div>
        <h1 style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.025em; margin: 0 0 0.5rem 0; color: #f8fafc;">BeerReal</h1>
        <p style="font-size: 0.875rem; color: #94a3b8; margin: 0 0 1.25rem 0; max-width: 20rem;">Loading application updates...</p>
        <button onclick="window.location.reload(true)" style="background-color: #f59e0b; color: #0f172a; border: none; padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; shadow: 0 4px 6px -1px rgba(0,0,0,0.3);">Tap to Refresh</button>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
