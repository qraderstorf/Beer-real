<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="128" fill="#0f172a"/>
  <g transform="translate(64, 64) scale(0.75)">
    <!-- Left Mug -->
    <path d="M120,160 L240,160 L240,360 C240,400 200,420 160,420 L160,420 C120,420 80,400 80,360 L80,160 Z" fill="#f59e0b" stroke="#fef08a" stroke-width="12"/>
    <!-- Foam Left -->
    <path d="M70,160 C70,120 120,100 150,130 C170,100 210,100 230,130 C250,110 260,130 250,160 Z" fill="#ffffff" />
    <!-- Handle Left -->
    <path d="M80,200 L40,200 C20,200 20,300 40,300 L80,300" fill="none" stroke="#fef08a" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Right Mug (clinking) -->
    <g transform="translate(384, 0) scale(-1, 1)">
      <path d="M120,160 L240,160 L240,360 C240,400 200,420 160,420 L160,420 C120,420 80,400 80,360 L80,160 Z" fill="#d97706" stroke="#fef08a" stroke-width="12"/>
      <path d="M70,160 C70,120 120,100 150,130 C170,100 210,100 230,130 C250,110 260,130 250,160 Z" fill="#ffffff" />
      <path d="M80,200 L40,200 C20,200 20,300 40,300 L80,300" fill="none" stroke="#fef08a" stroke-width="12" stroke-linecap="round"/>
    </g>

    <!-- Sparkles/Cheers indicator -->
    <circle cx="256" cy="180" r="12" fill="#ffffff" />
    <path d="M256,120 L256,150" stroke="#fef08a" stroke-width="8" stroke-linecap="round"/>
    <path d="M210,140 L230,160" stroke="#fef08a" stroke-width="8" stroke-linecap="round"/>
    <path d="M302,140 L282,160" stroke="#fef08a" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
